<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}News Collect Solution{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: bold; }
    .plan-badge { font-size: 0.75rem; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/dashboard/">📰 News Collect</a>
    {% if user.is_authenticated %}
    <div class="d-flex align-items-center gap-3">
      <span class="badge {% if user.is_paid %}bg-warning text-dark{% else %}bg-secondary{% endif %} plan-badge">
        {{ user.get_plan_display }}
      </span>
      <a href="/dashboard/themes/" class="text-white text-decoration-none">テーマ管理</a>
      <a href="/dashboard/favorites/" class="text-white text-decoration-none">⭐ お気に入り</a>
      {% if user.is_paid %}
      <a href="/notifications/channels/" class="text-white text-decoration-none">通知設定</a>
      {% endif %}
      <a href="/accounts/logout/" class="btn btn-outline-light btn-sm">ログアウト</a>
    </div>
    {% else %}
    <div class="d-flex gap-2">
      <a href="/accounts/login/" class="btn btn-outline-light btn-sm">ログイン</a>
      <a href="/accounts/signup/" class="btn btn-light btn-sm">新規登録</a>
    </div>
    {% endif %}
  </div>
</nav>

<div class="container mt-4">
  {% if messages %}
  {% for message in messages %}
  <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
    {{ message }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
