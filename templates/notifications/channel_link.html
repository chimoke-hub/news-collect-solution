{% extends "base.html" %}
{% block title %}通知設定 — {{ theme.name }}{% endblock %}

{% block content %}
<div class="page-container">
  <div style="max-width:560px;margin:0 auto;">
    <h2 class="mb-xl">「{{ theme.name }}」の通知先</h2>
    <div class="card-wise">
      {% if not channels %}
      <p class="text-mute">通知チャンネルがありません。先にチャンネルを追加してください。</p>
      <a href="{% url 'notifications:channel_create' %}" class="btn-wise btn-primary mt-md">チャンネルを追加</a>
      {% else %}
      <form method="post">
        {% csrf_token %}
        {% for ch in channels %}
        <label style="display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-md) 0;border-bottom:1px solid rgba(14,15,12,.06);cursor:pointer;">
          <input type="checkbox" name="channel_ids" value="{{ ch.pk }}"
                 {% if ch.pk in linked_ids %}checked{% endif %}
                 style="width:18px;height:18px;accent-color:var(--primary);">
          <div>
            <span style="font-weight:600;">{{ ch.name }}</span>
            <span class="badge-wise badge-mute" style="margin-left:8px;">{{ ch.get_channel_type_display }}</span>
          </div>
        </label>
        {% endfor %}
        <div class="d-flex gap-sm mt-xl">
          <button type="submit" class="btn-wise btn-primary">保存する</button>
          <a href="{% url 'dashboard:theme_detail' theme.pk %}" class="btn-wise btn-secondary">キャンセル</a>
        </div>
      </form>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
