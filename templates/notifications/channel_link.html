{% extends "base.html" %}
{% block title %}通知設定 — {{ theme.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-header"><h4 class="mb-0">「{{ theme.name }}」の通知先チャンネル</h4></div>
      <div class="card-body">
        {% if not channels %}
        <p class="text-muted">通知チャンネルがありません。先にチャンネルを追加してください。</p>
        <a href="{% url 'notifications:channel_create' %}" class="btn btn-primary">チャンネルを追加</a>
        {% else %}
        <form method="post">
          {% csrf_token %}
          {% for ch in channels %}
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" name="channel_ids" value="{{ ch.pk }}"
                   id="ch_{{ ch.pk }}" {% if ch.pk in linked_ids %}checked{% endif %}>
            <label class="form-check-label" for="ch_{{ ch.pk }}">
              {{ ch.name }} <span class="text-muted small">({{ ch.get_channel_type_display }})</span>
            </label>
          </div>
          {% endfor %}
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">保存する</button>
            <a href="{% url 'dashboard:theme_detail' theme.pk %}" class="btn btn-outline-secondary">キャンセル</a>
          </div>
        </form>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
