{% extends "base.html" %}
{% block title %}チャンネル追加 — News Collect{% endblock %}

{% block content %}
<div class="page-container">
  <div style="max-width:560px;margin:0 auto;">
    <h2 class="mb-xl">通知チャンネルを追加</h2>
    <div class="card-wise">
      <form method="post">
        {% csrf_token %}
        <div class="mb-lg">
          <label class="label-wise">種別</label>
          <select name="channel_type" class="input-wise" required>
            {% for value, label in channel_types %}
            <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-lg">
          <label class="label-wise">チャンネル名</label>
          <input type="text" name="name" class="input-wise" placeholder="例: 社内Slackチャンネル" required>
        </div>
        <div class="mb-xl">
          <label class="label-wise">Webhook URL</label>
          <input type="url" name="webhook_url" class="input-wise" placeholder="https://hooks.slack.com/..." required>
          <p class="field-hint">Slack: Incoming Webhooks / Teams: Connectors から取得してください。</p>
        </div>
        <div class="d-flex gap-sm">
          <button type="submit" class="btn-wise btn-primary">追加する</button>
          <a href="{% url 'notifications:channel_list' %}" class="btn-wise btn-secondary">キャンセル</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
