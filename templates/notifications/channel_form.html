{% extends "base.html" %}
{% block title %}チャンネル追加 — News Collect{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-header"><h4 class="mb-0">通知チャンネルを追加</h4></div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-bold">種別</label>
            <select name="channel_type" class="form-select" required>
              {% for value, label in channel_types %}
              <option value="{{ value }}">{{ label }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">チャンネル名</label>
            <input type="text" name="name" class="form-control" placeholder="例: 社内Slackチャンネル" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Webhook URL</label>
            <input type="url" name="webhook_url" class="form-control"
                   placeholder="https://hooks.slack.com/..." required>
            <div class="form-text">Slack: Incoming Webhooks / Teams: Connectors から取得してください。</div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">追加する</button>
            <a href="{% url 'notifications:channel_list' %}" class="btn btn-outline-secondary">キャンセル</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
